<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradientYH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a64dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2f4a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bgGradient)" rx="32"/>

  <!-- Subtle border -->
  <rect width="256" height="256" fill="none" stroke="#1e3a52" stroke-width="0" rx="32"/>

  <!-- Y Letter -->
  <text x="64" y="180" font-size="140" font-weight="700" font-family="Inter, -apple-system, sans-serif" fill="url(#gradientYH)" text-anchor="middle" dominant-baseline="middle">Y</text>

  <!-- H Letter -->
  <text x="180" y="180" font-size="140" font-weight="700" font-family="Inter, -apple-system, sans-serif" fill="url(#gradientYH)" text-anchor="middle" dominant-baseline="middle">H</text>

  <!-- Accent dot -->
  <circle cx="220" cy="50" r="8" fill="url(#gradientYH)" opacity="0.6"/>
</svg>